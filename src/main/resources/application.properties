spring.application.name=portfolio-backend

#postgres connection
spring.datasource.url=jdbc:postgresql://localhost:5432/portfolioDB
spring.datasource.username=postgres
spring.datasource.password=1234567890

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Reduce noise
logging.level.root=WARN
logging.level.org.springframework=ERROR

# Show only your app logs
logging.level.com.chandan.portfolio=INFO

# Show SQL (optional clean format)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true 

# Use dynamic port (required for Render)
server.port=${PORT:8080}

# PostgreSQL (we’ll replace with Neon later)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false